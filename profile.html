<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Profil | ECG Build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a2f4a;
            --primary-dark: #0c1829;
            --primary-light: #2a4d73;
            --accent: #d4af37;
            --accent-dark: #b8962d;
            --accent-light: #e8ca5a;
            --text: #1a1f2e;
            --text-light: #556073;
            --text-muted: #8b95a8;
            --bg: #fafbfc;
            --bg-alt: #f2f4f7;
            --bg-dark: #090e1a;
            --bg-card: #ffffff;
            --border: #dfe3ea;
            --success: #10b981;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 6px 16px rgba(0,0,0,0.03);
            --shadow-lg: 0 8px 16px rgba(0,0,0,0.04), 0 20px 56px rgba(0,0,0,0.08);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar (simplified) ── */
        .pf-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
        }

        .pf-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pf-nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-dark);
            font-size: 16px;
            font-weight: 600;
        }

        .pf-nav-logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            font-size: 15px;
            font-weight: 800;
        }

        .pf-nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .pf-nav-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Hero / Header ── */
        .pf-hero {
            background: linear-gradient(160deg, #060b14 0%, #0c1829 25%, #152238 50%, #1a2f4a 75%, #1f3654 100%);
            padding: 120px 0 60px;
            position: relative;
            overflow: hidden;
        }

        .pf-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212,175,55,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(42,77,115,0.15) 0%, transparent 40%);
        }

        .pf-hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
            display: flex;
            gap: 48px;
            align-items: center;
        }

        .pf-avatar-wrap {
            flex-shrink: 0;
        }

        .pf-avatar {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(212,175,55,0.3);
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pf-avatar svg {
            width: 140px;
            height: 140px;
        }

        .pf-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pf-hero-info {
            flex: 1;
            min-width: 0;
        }

        .pf-hero-badge {
            display: inline-block;
            padding: 5px 14px;
            background: rgba(212,175,55,0.12);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 100px;
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .pf-hero-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .pf-hero-role {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        .pf-hero-stats {
            display: flex;
            gap: 32px;
        }

        .pf-hstat {
            display: flex;
            flex-direction: column;
        }

        .pf-hstat-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
        }

        .pf-hstat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        /* ── Content ── */
        .pf-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 40px;
        }

        .pf-main { min-width: 0; }

        /* Sections */
        .pf-section {
            margin-bottom: 40px;
        }

        .pf-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pf-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Bio */
        .pf-bio {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.8;
        }

        .pf-bio p + p {
            margin-top: 16px;
        }

        /* Quote */
        .pf-quote {
            border-left: 3px solid var(--accent);
            padding: 20px 24px;
            background: var(--bg-alt);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 24px 0;
        }

        .pf-quote p {
            font-size: 15px;
            font-style: italic;
            color: var(--text);
            line-height: 1.7;
        }

        /* Timeline */
        .pf-timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
            padding-left: 28px;
        }

        .pf-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: var(--border);
        }

        .pf-tl-item {
            position: relative;
            padding-bottom: 28px;
        }

        .pf-tl-item:last-child {
            padding-bottom: 0;
        }

        .pf-tl-dot {
            position: absolute;
            left: -28px;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bg);
            border: 3px solid var(--accent);
        }

        .pf-tl-item:first-child .pf-tl-dot {
            background: var(--accent);
        }

        .pf-tl-year {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .pf-tl-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }

        .pf-tl-company {
            font-size: 13px;
            color: var(--text-light);
        }

        .pf-tl-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.6;
        }

        /* Expertise */
        .pf-expertise {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pf-exp-tag {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 100px;
            background: linear-gradient(135deg, rgba(26,47,74,0.06), rgba(212,175,55,0.08));
            border: 1px solid rgba(212,175,55,0.2);
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
        }

        /* Projects list */
        .pf-projects-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pf-project-item {
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            background: var(--bg-alt);
            border: 1px solid var(--border);
        }

        .pf-project-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .pf-project-role {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .pf-project-result {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--success);
        }

        /* Education */
        .pf-edu-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pf-edu-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .pf-edu-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pf-edu-icon svg { color: var(--accent); }

        .pf-edu-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .pf-edu-desc {
            font-size: 13px;
            color: var(--text-light);
        }

        /* Certifications */
        .pf-certs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pf-cert-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 100px;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .pf-cert-tag svg { color: var(--accent); }

        /* ── Sidebar ── */
        .pf-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .pf-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .pf-card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 16px;
        }

        /* Contact rows */
        .pf-contact-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pf-contact-row {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .pf-contact-row:hover {
            background: var(--bg-alt);
        }

        .pf-contact-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pf-contact-icon svg { color: var(--accent); }

        .pf-contact-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .pf-contact-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        /* Actions */
        .pf-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pf-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .pf-btn-gold {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary-dark);
        }

        .pf-btn-gold:hover {
            box-shadow: 0 6px 20px rgba(201,168,76,0.3);
            transform: translateY(-1px);
        }

        .pf-btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .pf-btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pf-btn-dark {
            background: var(--primary-dark);
            color: #fff;
        }

        .pf-btn-dark:hover {
            background: var(--primary);
        }

        /* QR card */
        .pf-qr-wrap {
            text-align: center;
        }

        .pf-qr-wrap .qr-box {
            display: inline-block;
            padding: 14px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 12px;
        }

        .pf-qr-text {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Other members */
        .pf-others {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pf-other-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .pf-other-link:hover {
            background: var(--bg-alt);
        }

        .pf-other-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .pf-other-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .pf-other-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Footer ── */
        .pf-footer {
            background: var(--bg-dark);
            padding: 32px 0;
            text-align: center;
        }

        .pf-footer p {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }

        .pf-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .pf-content {
                grid-template-columns: 1fr;
            }
            .pf-hero-inner {
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }
            .pf-hero-stats {
                justify-content: center;
            }
            .pf-avatar {
                width: 140px;
                height: 140px;
            }
        }

        @media (max-width: 480px) {
            .pf-hero { padding: 100px 0 40px; }
            .pf-content { padding: 32px 16px 60px; }
            .pf-hero-stats { gap: 20px; }
            .pf-hstat-val { font-size: 20px; }
            .pf-avatar { width: 110px; height: 110px; }
            .pf-card { padding: 20px; }
            .pf-nav-inner { padding: 0 16px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="pf-nav">
    <div class="pf-nav-inner">
        <a href="index.html" class="pf-nav-logo">

<!-- HERO -->
<section class="pf-hero">

        <div class="pf-hero-info">

</section>

<!-- CONTENT -->
<div class="pf-content">
    <div class="pf-main" id="pfMain">

<!-- FOOTER -->
<footer class="pf-footer">

        bio: '<p>Miroslav Fencl zalozil Euro Ceramic Group v roce 1999. Zacinall s dovozem keramickych obkladu a dlazeb z Italie a Spanelska — v dobe, kdy cesky trh zaplaval levnym zbozim z Polska a Ciny, on vsadil na kvalitu. Postupne rozsiroval sortiment o stavebni chemii, sanitarni techniku a kompletni vybaveni koupelen. Behem sedmnacti let vybudoval firmu s celostátni distribucí a stabilnim portfoliem odberatelu z rad stavebních firem.</p><p>V roce 2016 narazi u jednoho z klientu na modularni bunky — mobilni kancelare na stavbe. Zacne zjistovat vic. Ocel, izolace, prefabrikace v hale, montaz na miste za par dni. Uvidi v tom budoucnost: stavba, ktera netrva mesice ale tydny, da se prevest a znovu pouzit. V roce 2018 kupuje prvni sadu obytnych bunek a dostava zakazku v Kraslicich — ubytovani pro agenturni pracovniky. Stavba za sest tydnu. Od te doby uz nedela nic jineho.</p><p>V roce 2021 zaklada ECG Build — investicni rameno firmy, ktere propojuje kapital s modularni vystavbou. Najima Bergera na realizace, Vlcka na pravo, Machovou na provoz. Prvni investori jsou lidi z branze, kteri videli jeho bunky v akci. Dnes fond spravuje 206 nasazenych bunek a Fencl zastava roli predsedy — schvaluje investice, nastavuje strategii a drzi kontakt s klicovymi investory.</p>',

// VCF download
document.getElementById('btnVcf').addEventListener('click', function() {
    const nameParts = m.name.replace(/\s*(Ing\.|JUDr\.|Ph\.D\.|MBA|,)\s*/g, ' ').trim().split(/\s+/);
    const lastName = nameParts.pop();
    const firstName = nameParts.join(' ');
    const vcf = [
        'BEGIN:VCARD','VERSION:3.0',
        'N:' + lastName + ';' + firstName + ';;;',
        'FN:' + m.name,
        'ORG:Euro Ceramic Group s.r.o.',
        'TITLE:' + m.role,
        'TEL;TYPE=WORK,VOICE:' + m.phone.replace(/\s/g, ''),
        'EMAIL;TYPE=WORK:' + m.email,
        'URL:https://invx10.vercel.app',
        'ADR;TYPE=WORK:;;Namesti 14. rijna 1307/2;Praha;;150 00;Czech Republic',
        'END:VCARD'
    ].join('\r\n');
    const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = id + '.vcf'; a.click();
    URL.revokeObjectURL(url);
});

// Share
document.getElementById('btnShare').addEventListener('click', function() {
    if (navigator.share) {
        navigator.share({ title: m.name + ' | ECG Build', url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
            const btn = document.getElementById('btnShare');
            const orig = btn.innerHTML;
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Odkaz zkopirovan!';
            setTimeout(() => { btn.innerHTML = orig; }, 2000);
        });
    }
});
