<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Vizitka | Vertex Capital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a2f4a;
            --primary-dark: #0c1829;
            --accent: #d4af37;
            --accent-dark: #b8962d;
            --text: #1a1f2e;
            --text-light: #556073;
            --bg: #f2f4f7;
            --bg-card: #ffffff;
            --border: #dfe3ea;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .vcard-page {
            width: 100%;
            max-width: 480px;
        }

        /* Back link */
        .vcard-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .vcard-back:hover { color: var(--accent); }

        /* Card */
        .vcard {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04), 0 20px 56px rgba(0,0,0,0.08);
        }

        /* Header */
        .vcard-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 40px 32px 32px;
            text-align: center;
            position: relative;
        }

        .vcard-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .vcard-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(212,175,55,0.4);
            margin: 0 auto 16px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vcard-avatar svg {
            width: 80px;
            height: 80px;
        }

        .vcard-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vcard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .vcard-header .role {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .vcard-header .company {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        /* Body */
        .vcard-body {
            padding: 28px 32px;
        }

        .vcard-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .vcard-info {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .vcard-row {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .vcard-row:hover {
            border-color: var(--accent);
            background: rgba(212,175,55,0.04);
        }

        .vcard-row-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .vcard-row-icon svg {
            color: var(--accent);
        }

        .vcard-row-text {
            flex: 1;
            min-width: 0;
        }

        .vcard-row-label {
            font-size: 11px;
            color: var(--text-light);
            font-weight: 500;
        }

        .vcard-row-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        /* QR */
        .vcard-qr-section {
            text-align: center;
            padding: 24px 0;
            border-top: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .vcard-qr-section .vcard-section-title {
            margin-bottom: 20px;
        }

        .qr-wrap {
            display: inline-block;
            background: #fff;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .qr-wrap canvas, .qr-wrap img {
            display: block;
        }

        .qr-url {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-light);
            word-break: break-all;
        }

        /* Actions */
        .vcard-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .vcard-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .vcard-btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary-dark);
        }

        .vcard-btn-primary:hover {
            box-shadow: 0 6px 20px rgba(201,168,76,0.3);
            transform: translateY(-1px);
        }

        .vcard-btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .vcard-btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Footer */
        .vcard-footer {
            text-align: center;
            padding: 20px 32px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .vcard-footer p {
            font-size: 11px;
            color: var(--text-light);
        }

        .vcard-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Print */
        @media print {
            body { background: #fff; padding: 0; }
            .vcard { box-shadow: none; border: 1px solid #ddd; }
            .vcard-back, .vcard-actions { display: none; }
        }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .vcard-header { padding: 32px 20px 24px; }
            .vcard-body { padding: 24px 20px; }
            .vcard-header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="vcard-page">
    <a href="index.html" class="vcard-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Zpet na web
    </a>

    <div class="vcard" id="vcardRoot">
        <div class="vcard-header">
            <div class="vcard-logo">V</div>
            <div class="vcard-avatar" id="vcardAvatar">
                <svg viewBox="0 0 120 120" fill="none">
                    <circle cx="60" cy="45" r="22" fill="rgba(255,255,255,0.15)"/>
                    <ellipse cx="60" cy="110" rx="38" ry="30" fill="rgba(255,255,255,0.1)"/>
                    <text x="60" y="52" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="20" font-weight="700" font-family="Inter,sans-serif" id="vcardInitials">VC</text>
                </svg>
            </div>
            <h1 id="vcardName">Vertex Capital</h1>
            <div class="role" id="vcardRole">Investicni fond</div>
            <div class="company">Vertex Capital s.r.o.</div>
        </div>

        <div class="vcard-body">
            <div class="vcard-section-title">Kontaktni udaje</div>
            <div class="vcard-info" id="vcardInfo">
                <a href="tel:" class="vcard-row" id="rowPhone">
                    <div class="vcard-row-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </div>
                    <div class="vcard-row-text">
                        <div class="vcard-row-label">Telefon</div>
                        <div class="vcard-row-value" id="valPhone"></div>
                    </div>
                </a>
                <a href="mailto:" class="vcard-row" id="rowEmail">
                    <div class="vcard-row-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div class="vcard-row-text">
                        <div class="vcard-row-label">E-mail</div>
                        <div class="vcard-row-value" id="valEmail"></div>
                    </div>
                </a>
                <a href="https://invx10.vercel.app" target="_blank" class="vcard-row">
                    <div class="vcard-row-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <div class="vcard-row-text">
                        <div class="vcard-row-label">Web</div>
                        <div class="vcard-row-value">invx10.vercel.app</div>
                    </div>
                </a>
                <div class="vcard-row">
                    <div class="vcard-row-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    </div>
                    <div class="vcard-row-text">
                        <div class="vcard-row-label">Adresa</div>
                        <div class="vcard-row-value">Na Prikope 15, 110 00 Praha 1</div>
                    </div>
                </div>
            </div>

            <div class="vcard-qr-section">
                <div class="vcard-section-title">QR kod</div>
                <div class="qr-wrap" id="qrWrap"></div>
                <div class="qr-url" id="qrUrl"></div>
            </div>

            <div class="vcard-actions">
                <button class="vcard-btn vcard-btn-primary" id="btnDownloadVcf">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Ulozit kontakt (.vcf)
                </button>
                <button class="vcard-btn vcard-btn-outline" id="btnShare">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Sdilet vizitku
                </button>
            </div>
        </div>

        <div class="vcard-footer">
            <p>Vertex Capital s.r.o. &mdash; <a href="https://invx10.vercel.app">invx10.vercel.app</a></p>
        </div>
    </div>
</div>

<script>
const MEMBERS = {
    novak: {
        name: 'Ing. Martin Novak, MBA',
        initials: 'MN',
        role: 'CEO & zakladatel',
        phone: '+420 601 123 456',
        email: 'novak@vertexcapital.cz',
    },
    kralova: {
        name: 'Ing. Petra Kralova, Ph.D.',
        initials: 'PK',
        role: 'Hlavni analytik',
        phone: '+420 602 234 567',
        email: 'kralova@vertexcapital.cz',
    },
    dvorak: {
        name: 'JUDr. Jan Dvorak',
        initials: 'JD',
        role: 'Pravni reditel',
        phone: '+420 603 345 678',
        email: 'dvorak@vertexcapital.cz',
    },
    svoboda: {
        name: 'Ing. Lukas Svoboda',
        initials: 'LS',
        role: 'Realitni reditel',
        phone: '+420 604 456 789',
        email: 'svoboda@vertexcapital.cz',
    }
};

const params = new URLSearchParams(window.location.search);
const memberId = params.get('m');
const member = MEMBERS[memberId];

if (member) {
    document.getElementById('vcardName').textContent = member.name;
    document.getElementById('vcardRole').textContent = member.role;
    document.getElementById('vcardInitials').textContent = member.initials;
    document.getElementById('valPhone').textContent = member.phone;
    document.getElementById('valEmail').textContent = member.email;
    document.getElementById('rowPhone').href = 'tel:' + member.phone.replace(/\s/g, '');
    document.getElementById('rowEmail').href = 'mailto:' + member.email;
    document.title = member.name + ' | Vertex Capital';
} else {
    document.getElementById('vcardName').textContent = 'Vertex Capital';
    document.getElementById('vcardRole').textContent = 'Investicni fond';
    document.getElementById('vcardInitials').textContent = 'VC';
    document.getElementById('valPhone').textContent = '+420 601 000 000';
    document.getElementById('valEmail').textContent = 'info@vertexcapital.cz';
    document.getElementById('rowPhone').href = 'tel:+420601000000';
    document.getElementById('rowEmail').href = 'mailto:info@vertexcapital.cz';
}

// QR Code
const qrUrl = window.location.href;
document.getElementById('qrUrl').textContent = qrUrl.replace(/^https?:\/\//, '');

try {
    const qr = qrcode(0, 'M');
    qr.addData(qrUrl);
    qr.make();
    const size = 6;
    document.getElementById('qrWrap').innerHTML = qr.createSvgTag(size, 0);
    const svg = document.querySelector('#qrWrap svg');
    if (svg) {
        svg.style.display = 'block';
        svg.style.width = '180px';
        svg.style.height = '180px';
    }
} catch(e) {
    document.getElementById('qrWrap').innerHTML = '<p style="padding:20px;color:#999;">QR kod nelze vygenerovat</p>';
}

// Download VCF
document.getElementById('btnDownloadVcf').addEventListener('click', function() {
    const m = member || { name: 'Vertex Capital', phone: '+420601000000', email: 'info@vertexcapital.cz', role: 'Investicni fond' };
    const nameParts = m.name.replace(/\s*(Ing\.|JUDr\.|Ph\.D\.|MBA|,)\s*/g, ' ').trim().split(/\s+/);
    const lastName = nameParts.pop();
    const firstName = nameParts.join(' ');
    const vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:' + lastName + ';' + firstName + ';;;',
        'FN:' + m.name,
        'ORG:Vertex Capital s.r.o.',
        'TITLE:' + m.role,
        'TEL;TYPE=WORK,VOICE:' + m.phone.replace(/\s/g, ''),
        'EMAIL;TYPE=WORK:' + m.email,
        'URL:https://invx10.vercel.app',
        'ADR;TYPE=WORK:;;Na Prikope 15;Praha;;110 00;Czech Republic',
        'END:VCARD'
    ].join('\r\n');
    const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (memberId || 'vertex-capital') + '.vcf';
    a.click();
    URL.revokeObjectURL(url);
});

// Share
document.getElementById('btnShare').addEventListener('click', function() {
    if (navigator.share) {
        navigator.share({
            title: (member ? member.name : 'Vertex Capital') + ' | Vizitka',
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(window.location.href).then(function() {
            const btn = document.getElementById('btnShare');
            const orig = btn.innerHTML;
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Odkaz zkopirovan!';
            setTimeout(function() { btn.innerHTML = orig; }, 2000);
        });
    }
});
</script>
</body>
</html>
